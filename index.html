<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocturne Soiree - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
　　<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
　　<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="ticket-section">
        <div class="ticket-container">
            <div class="ticket">
                <div class="ticket-front">
　　　　　　　　　　　<img src="ticket_omote.jpeg" alt="チケット表">
                </div>
                <div class="ticket-back">
                    <img src="https://via.placeholder.com/400x200/222/fff?text=TICKET+BACK" alt="チケット裏">
                </div>
            </div>
        </div>
        <p class="scroll-hint">Scroll Down</p>
    </section>

    <section class="gallery-section">
        <h2 class="section-title">Works</h2>
        <div class="gallery-grid">
            
            <div class="work-item">
                <video controls src="your-video.mp4" poster="video-placeholder.jpg"></video>
                <p>Promotional video</p>
                <a href="your-video.mp4" download class="download-btn">Download Video</a>
            </div>

            <div class="work-item">
                <img src="https://via.placeholder.com/600x400/555/eee" alt="作品画像">
                <p>Wallpaper</p>
                <a href="https://via.placeholder.com/600x400/555/eee" download class="download-btn">Download Image</a>
            </div>
    <div class="attention-text">
        <p>※無断転載禁止 / 私的利用の範囲内でお楽しみください。</p>
    </div>
</section>


        </div>
    </section>

    <footer class="footer">
        <div class="sns-link">
            <a href="https://x.com/@goconcha" target="_blank">𝕏 (Twitter)</a>
        </div>
    </footer>

<script>
    const ticket = document.querySelector('.ticket');
    const gallery = document.querySelector('.gallery-section');
    const footer = document.querySelector('.footer');

    // 1. スクロール検知：ある程度スクロールしたら勝手に裏返る
    window.addEventListener('scroll', function() {
        const scrollValue = window.scrollY;

        // チケットを裏返すタイミング（150pxくらいスクロールしたら）
        if (scrollValue > 150) {
            ticket.classList.add('is-flipped');
        } else {
            ticket.classList.remove('is-flipped');
        }

        // 下のコンテンツをふわっと出す（300pxくらいスクロールしたら）
        if (scrollValue > 300) {
            gallery.classList.add('is-visible');
            footer.classList.add('is-visible');
        }
    });

    // 2. タップ（クリック）検知：手動で表裏を切り替える
    ticket.addEventListener('click', function() {
        ticket.classList.toggle('is-flipped');
    });
</script>
</body>
</html>
